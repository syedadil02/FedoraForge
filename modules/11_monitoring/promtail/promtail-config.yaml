server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

# Loki push endpoint — update this to your Loki instance URL
# If running Loki locally on the same host, use http://127.0.0.1:3100
clients:
  - url: http://127.0.0.1:3100/loki/api/v1/push

scrape_configs:
  # Scrape host system logs
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system-logs
          __path__: /var/log/*.log

  # Scrape Docker container logs
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker-logs
          __path__: /var/lib/docker/containers/**/*.log
    pipeline_stages:
      - docker: {}

  # Scrape systemd journal (sshd, NetworkManager, etc.)
  - job_name: journal
    journal:
      max_age: 12h
      labels:
        job: systemd-journal
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: 'unit'
