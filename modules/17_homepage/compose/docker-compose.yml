services:
  homepage:
    container_name: homepage
    image: ghcr.io/gethomepage/homepage:latest
    environment:
      - PUID=0
      - PGID=0
      - HOMEPAGE_ALLOWED_HOSTS=${TAILSCALE_HOSTNAME:-homelab-server}.${TAILSCALE_TAILNET:-ts.net}
    volumes:
      - /fastpool/homepage/config:/app/config
      - /fastpool/homepage/icons:/app/public/icons
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8085:3000"
    restart: unless-stopped

