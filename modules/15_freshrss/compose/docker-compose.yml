services:
  freshrss:
    image: freshrss/freshrss:latest
    container_name: homelab_freshrss
    restart: unless-stopped
    logging:
      options:
        max-size: 10m
    volumes:
      - ${CONFIG_BASE_DIR:-/fastpool}/freshrss/data:/var/www/FreshRSS/data
      - ${CONFIG_BASE_DIR:-/fastpool}/freshrss/extensions:/var/www/FreshRSS/extensions
    environment:
      - TZ=${TIMEZONE:-UTC}
      - CRON_MIN=1,31              # Automatically refreshes feeds twice an hour
    ports:
      - "8449:80"
